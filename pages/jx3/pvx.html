---
layout: default
---

<link rel="stylesheet" type="text/css" href="/assets/css/jx3-pvx.css" />
<div class="box">
    <div class="mask_box">
        <div class="video_box">
            <!-- 左边视频 -->
            <div class="gray_box"></div>
            <div class="left_video">
                <a href="/categories/jx3/photoGroup.html" class="yyBtn"></a>
                <div class="left_mask" style="opacity: 0.4;"></div>
                <div class="l_bg1"></div>
            </div>
            <!--  右边视频 -->
            <div class="right_video">
                <a href="/categories/jx3/photoGroup.html" class="hjBtn"></a>
                <div class="right_mask" style="opacity: 0.4;"></div>
                <div class="r_bg1"></div>
            </div>
        </div>
    </div>
</div>

<script>
    document.title = '休闲向';
    $(function() {
        var wwth = $(window).width();
        if (wwth > 1920) {
            $('body').css({
                'width': '1920px',
                'margin-top': '0',
                'margin-left': 'auto',
                'margin-bottom': '0',
                'margin-right': 'auto',
            });
        }

        // 左侧视频
        $(".left_video").mouseenter(function() {
            $(".left_video .left_mask").stop().animate({
                opacity: "0"
            });
            $(".right_mask").stop().animate({
                opacity: "0.4"
            });
        });
        $(".left_video").mouseleave(function() {
            $(".left_video .left_mask").stop().animate({
                opacity: "0.4"
            });
            $(".right_mask").stop().animate({
                opacity: "0.4"
            });
        });

        // 右侧视频
        $(".right_video").mouseenter(function() {
            $(".left_video .left_mask").stop().animate({
                opacity: "0.4"
            });
            $(".right_mask").stop().animate({
                opacity: "0"
            });
        });
        $(".right_video").mouseleave(function() {
            $(".left_video .left_mask").stop().animate({
                opacity: "0.4"
            });
            $(".right_mask").stop().animate({
                opacity: "0.4"
            });
        });

        $(".yyBtn").mouseenter(function() {
            $(".left_video .left_mask").stop().animate({
                opacity: "0.4"
            });
        });
        $(".yyBtn").mouseleave(function() {
            $(".left_video .left_mask").stop().animate({
                opacity: "0"
            });
        });

        $(".hjBtn").mouseenter(function() {
            $(".right_mask").stop().animate({
                opacity: "0.4"
            });
        });
        $(".hjBtn").mouseleave(function() {
            $(".right_mask").stop().animate({
                opacity: "0"
            });
        });
    })
</script>
