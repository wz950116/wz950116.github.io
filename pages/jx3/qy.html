---
layout: default
---

<head>
	<meta charset="UTF-8">
	<title></title>
	<style>
		* {
			padding: 0;
			margin: 0;
		}

		html, body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: url(https://jx3.xoyo.com/gn/assets/images/page6/homepage/bg-box/bg-3.110a2b78.jpg) no-repeat;
			background-size: cover;
		}

		.lunbo {
		    position: absolute;
		    left: 50%;
		    top: 50%;
		    margin-left: -465px;
		    margin-top: -265px;
		    width: 930px;
		    height: 530px;
		    overflow: hidden;
		}

		.dg-container {
		    width: 100%;
		    height: 470px;
		    position: absolute;
		    top: 0;
		    padding-top: 4px;
		}

		.dg-wrapper {
		    width: 598px;
		    height: 470px;
		    margin: 0 auto;
		    position: relative;
	        transform-style: preserve-3d;
	        perspective: 1000px;
		}
		.dg-wrapper a {
			width: 100%;
		    height: 100%;
		    display: block;
		    position: absolute;
		    left: 0;
		    top: 0;
		    background: #000000;
		    box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
		    transition: all .5s;
		    overflow: hidden;
		}

		.dg-wrapper a.dg-center {
			z-index: 99999;
			cursor: pointer;
		}

		.dg-wrapper a .img {
		    width: 100%;
		    height: 100%;
		    overflow: hidden;
		    background-repeat: no-repeat;
		    background-position: center -200px;
		}

		.dg-wrapper a .shadow {
			position: absolute;
			left: 0;
			right: 0;
			top: 0;
			bottom: 0;
		    width: 100%;
		    height: 100%;
		    background: rgba(0, 0, 0, .5) url('https://wz950116.bj.bcebos.com/jx3-sl%2Fpublic%2Fcheck.png') no-repeat center;
		    display: block;
		}

		.dg-wrapper .dg-center .shadow {
			display: none;
		}

		.dg-wrapper a .line {
		    position: absolute;
		    top: 8px;
		    left: 8px;
		    bottom: 8px;
		    right: 8px;
			display: block;
		    border: 1px solid #fff;
		    opacity: .3;
		}

		.dg-wrapper .dg-center:hover .shadow {
			display: block;
		}

		.dg-wrapper .dg-center:hover .line {
			opacity: 1;
		}

		.dg-wrapper a div.miaoshu {
		    position: absolute;
			left: -155px;
		    bottom: -25px;
		    display: block;
		    color: #e6e6e6;
		    font-size: 13px;
		    width: 850px;
		    height: 50px;
		    line-height: 25px;
		    text-align: center;
		}

		.dg-wrapper a div.miaoshu p {
			display: block;
		    width: 100%;
		    height: 50px;
		    overflow: hidden;
		}

		.dg-wrapper a div.miaoshu .num {
		    position: absolute;
		    right: -55px;
		    top: 0;
		}

		.dg-wrapper a div.miaoshu .num i {
		    color: #f0412a;
		    font-style: normal;
		}

		.dg-wrapper a div.miaoshu .num u {
		    text-decoration: none;
		}
		
		.dg-container .lbbtn {
			z-index: 1000;
		}

		.dg-container .lbbtn span {
			position: absolute;
		    display: block;
		    background: url(http://static.cubejoy.com/store/images/lun2.png) no-repeat;
		    cursor: pointer;
		    top: 200px;
		    width: 25px;
		    height: 17px;
		    opacity: 0.8;
		    transform: rotate(90deg);
		}

		.dg-container .lbbtn span.dg-prev {
		    background-position: -24px 1px;
    		left: 60px;
		}

		.dg-container .lbbtn span.dg-prev:hover {
			background-position: -24px -16px;
		}

		.dg-container .lbbtn span.dg-next {
			background-position: 1px 1px;
    		right: 60px;
		}

		.dg-container .lbbtn span.dg-next:hover {
			background-position: 1px -16px;
		}
	</style>
</head>
<body>
	<div class="lunbo">
		<div id="dg-container" class="dg-container">
			<div class="dg-wrapper">
				<a data-src="/uploads/allimg/171222/379-1G222143139.jpg" class="dg-center" style="opacity: 1; visibility: visible;">
				    <div class="img"></div>
				    <div class="shadow"></div>
				    <span class='line'></span>
				    <!-- <div class="miaoshu">
				        <p></p>
				        <div class="num"><i>1</i> /<u> 8</u></div>
				    </div> -->
				</a>

				<a data-src="/uploads/allimg/171222/379-1G222143140.jpg" style="opacity: 1; visibility: visible; transform: translateX(240px) translateZ(-200px) rotateY(-45deg);" class="">
				    <div class="img"></div>
				    <div class="shadow"></div>
				    <span class='line'></span>
				</a>

				<a data-src="/uploads/allimg/171222/379-1G222143140-50.jpg" style="opacity: 0; visibility: hidden; transform: translateX(450px) translateZ(-300px) rotateY(-45deg);">
				    <div class="img"></div>
				    <div class="shadow"></div>
				    <span class='line'></span>
				</a>

				<a data-src="/uploads/allimg/171222/379-1G222143141.jpg" style="opacity: 0; visibility: hidden; transform: translateX(-450px) translateZ(-300px) rotateY(45deg);">
				    <div class="img"></div>
				    <div class="shadow"></div>
				    <span class='line'></span>
				</a>

				<a data-src="/uploads/allimg/171222/379-1G222143145.jpg" style="opacity: 1; visibility: visible; transform: translateX(-240px) translateZ(-200px) rotateY(45deg);" class="">
				    <div class="img"></div>
				    <div class="shadow"></div>
				    <span class='line'></span>
				</a>
			</div>

			<div class="lbbtn">
                <span class="dg-prev"></span>
                <span class="dg-next"></span>
            </div>
		</div>
	</div>
</body>

<script type="text/javascript">
	let num = 0,  total = $('.dg-wrapper a').length, onOff = true
	let data = [
		'https://wz950116.bj.bcebos.com/jx3-pvx%2F%E6%88%90%E5%B0%B1%E5%A5%87%E9%81%87%E7%AD%89%2F2020-02-23_20-30-36-000.png',
		'https://wz950116.bj.bcebos.com/jx3-pvx%2F%E6%88%90%E5%B0%B1%E5%A5%87%E9%81%87%E7%AD%89%2F2019-12-26_19-16-18-000.png',
		'https://wz950116.bj.bcebos.com/jx3-pvx%2F%E6%88%90%E5%B0%B1%E5%A5%87%E9%81%87%E7%AD%89%2F2019-08-07_18-40-42-000.jpg',
		'https://wz950116.bj.bcebos.com/jx3-pvx%2F%E6%88%90%E5%B0%B1%E5%A5%87%E9%81%87%E7%AD%89%2F2018-11-25_10-56-47-000.png',
		'https://wz950116.bj.bcebos.com/jx3-pvx%2F%E6%88%90%E5%B0%B1%E5%A5%87%E9%81%87%E7%AD%89%2F2018-06-07_22-24-14-000.png'
	]
	$('.dg-wrapper .img').eq(0).css('background-image', `url(${data[0]})`)
	$('.dg-wrapper .img').eq(1).css('background-image', `url(${data[1]})`)
	$('.dg-wrapper .img').eq(2).css('background-image', `url(${data[2]})`)
	$('.dg-wrapper .img').eq(3).css('background-image', `url(${data[3]})`)
	$('.dg-wrapper .img').eq(total - 1).css('background-image', `url(${data[total - 1]})`)

	$('.dg-prev').on('click', function() {
		if (!onOff) return
		onOff = false

		// 先全部重置隐藏
		$('.dg-wrapper a').removeClass('dg-center').css({
			opacity: 0,
			visibility: 'hidden'
		})

		num = num - 1 < 0 ? total - 1 : num - 1

		fn()

		setTimeout(() => {
			onOff = true
		}, 800)
	})

	$('.dg-next').on('click', function() {
		if (!onOff) return
		onOff = false

		// 先全部重置隐藏
		$('.dg-wrapper a').removeClass('dg-center').css({
			opacity: 0,
			visibility: 'hidden'
		})

		num = num + 1 > total - 1 ? 0 : num + 1

		fn()

		setTimeout(() => {
			onOff = true
		}, 800)
	})

	const fn = () => {
		// 上一张
		let last = num - 1 < 0 ? total - 1 : num - 1
		// 上上张
		let lastLast = num - 2 < 0 ? (num - 1 < 0 ? last - 1 : total - 1) : (num - 2)
		// 下一章
		let next = num + 1 > total - 1 ? 0 : num + 1
		// 下下张
		let nextNext = num + 2 > total - 1 ? (num + 1 > total - 1 ? next + 1 : 0) : (num + 2)



		$('.dg-wrapper a').eq(last).css({
			transform: 'translateX(-240px) translateZ(-200px) rotateY(45deg)',
			opacity: 1,
			visibility: 'visible'
		})
		$('.dg-wrapper a').eq(lastLast).css({
			transform: 'translateX(-450px) translateZ(-300px) rotateY(45deg)'
		})
		$('.dg-wrapper a').eq(num).addClass('dg-center').css({
			transform: 'translateX(0) translateZ(0) rotateY(0)',
			opacity: 1,
			visibility: 'visible'
		})
		$('.dg-wrapper a').eq(next).css({
			transform: 'translateX(240px) translateZ(-200px) rotateY(-45deg)',
			opacity: 1,
			visibility: 'visible'
		})
		$('.dg-wrapper a').eq(nextNext).css({
			transform: 'translateX(450px) translateZ(-300px) rotateY(-45deg)'
		})
	}
</script>
